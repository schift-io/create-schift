<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}} - Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #1a3a2a;
      color: #4ade80;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 720px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #333;
      border-bottom-left-radius: 4px;
    }
    .msg.loading {
      opacity: 0.6;
    }
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }
    #input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #input-area input:focus {
      border-color: #555;
    }
    #input-area button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #1d4ed8;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    #input-area button:hover { background: #2563eb; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .duration { font-size: 11px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>{{PROJECT_NAME}}</h1>
    <span class="badge">Powered by Schift</span>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Ask a question..." autocomplete="off" />
    <button id="send-btn" onclick="send()">Send</button>
  </div>
  <script>
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function send() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = "";
      sendBtn.disabled = true;

      addMsg("user", text);
      const loadingEl = addMsg("assistant", "Thinking...");
      loadingEl.classList.add("loading");

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await resp.json();
        loadingEl.textContent = data.answer ?? data.error ?? "No response";
        loadingEl.classList.remove("loading");

        if (data.durationMs) {
          const dur = document.createElement("div");
          dur.className = "duration";
          dur.textContent = `${data.durationMs}ms`;
          loadingEl.appendChild(dur);
        }
      } catch (err) {
        loadingEl.textContent = "Error: " + err.message;
        loadingEl.classList.remove("loading");
      }
      sendBtn.disabled = false;
      msgInput.focus();
    }
  </script>
</body>
</html>
